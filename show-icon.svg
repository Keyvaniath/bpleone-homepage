<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2034"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#c9a73c"/>
    </linearGradient>
  </defs>
  <!-- Background (maskable safe zone keeps content inside 80% center circle) -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Pokemon-card-shaped pictogram, centered -->
  <g transform="translate(256, 256)">
    <!-- Card shape -->
    <rect x="-100" y="-130" width="200" height="260" rx="20" fill="url(#card-grad)" stroke="#0a0e1a" stroke-width="4"/>
    <!-- Inner panel -->
    <rect x="-78" y="-108" width="156" height="105" rx="6" fill="#0a0e1a"/>
    <!-- Dollar sign (the "value check" mark) -->
    <text x="0" y="50" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="800"
          text-anchor="middle" fill="#0a0e1a">$</text>
  </g>
  <!-- Small "live" pulse dot top-right -->
  <circle cx="420" cy="100" r="20" fill="#4ade80"/>
  <circle cx="420" cy="100" r="20" fill="#4ade80" opacity="0.4">
    <animate attributeName="r" values="20;30;20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
