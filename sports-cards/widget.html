<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Cards BUY Widget</title>
<style>
  :root {
    --bg: transparent;
    --bg-card: #131826;
    --border: #232a3e;
    --gold: #f5c842;
    --text: #e8ecf4;
    --text-dim: #8b94a8;
    --green: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }
  body { padding: 0; }
  .ticker-wrap {
    overflow: hidden;
    white-space: nowrap;
    border: 1px solid var(--border);
    background: var(--bg-card);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ticker-label {
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-right: 1px solid var(--border);
    padding-right: 12px;
  }
  .ticker-label .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.4 } }

  .ticker-track {
    flex: 1;
    overflow: hidden;
    display: flex;
  }
  .ticker-inner {
    display: inline-flex;
    gap: 22px;
    animation: scroll 60s linear infinite;
  }
  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    color: var(--text);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .ticker-item:hover { color: var(--gold); }
  .ticker-item .verdict {
    background: var(--green);
    color: #0a0e1a;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  .ticker-item .verdict.buy { background: #86efac; }
  .ticker-item .player { font-weight: 600; }
  .ticker-item .score {
    color: var(--gold);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .ticker-item .trend.pos { color: var(--green); font-family: 'JetBrains Mono', monospace; }
  .ticker-item .trend.neg { color: #fb923c; font-family: 'JetBrains Mono', monospace; }
  .ticker-item .sep { color: var(--text-dim); }

  .cta {
    flex-shrink: 0;
    background: var(--gold);
    color: #0a0e1a;
    text-decoration: none;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="ticker-wrap">
  <div class="ticker-label"><span class="dot"></span>LIVE BUYS</div>
  <div class="ticker-track"><div class="ticker-inner" id="ticker"></div></div>
  <a class="cta" href="https://bpleone.com/sports-cards/" target="_top">View all →</a>
</div>

<script>
const SIGNALS_URL = "https://raw.githubusercontent.com/Keyvaniath/bpleone-sports-cards-desk/main/docs/signals.json";

function verdictClass(v) {
  return v === "STRONG BUY" ? "" : "buy";
}
function fmt(s) {
  return `${s.player} <span class="score">${s.composite.toFixed(1)}</span>` +
    (s.trend30d !== 0 ?
      ` <span class="trend ${s.trend30d >= 0 ? 'pos' : 'neg'}">${s.trend30d > 0 ? '+' : ''}${Math.round(s.trend30d)}%</span>` : '') +
    ` <span class="sep">·</span> $${(s.anchor || 0).toLocaleString()}`;
}

async function render() {
  try {
    const r = await fetch(SIGNALS_URL + "?cb=" + Date.now());
    if (!r.ok) return;
    const data = await r.json();
    const buys = data.top_buys || [];
    if (!buys.length) return;
    const items = buys.map(s =>
      `<a class="ticker-item" href="https://bpleone.com/sports-cards/" target="_top">` +
      `<span class="verdict ${verdictClass(s.verdict)}">${s.verdict}</span>` +
      `<span class="player">${fmt(s)}</span></a>`
    ).join('');
    // Duplicate for seamless loop
    document.getElementById('ticker').innerHTML = items + items;
  } catch (e) { /* keep silent */ }
}

render();
setInterval(render, 5 * 60 * 1000);
</script>
</body>
</html>
