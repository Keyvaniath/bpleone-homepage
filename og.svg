<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#131826;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="goldGlow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#f5c842;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="greenGlow" cx="20%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#goldGlow)"/>
  <rect width="1200" height="630" fill="url(#greenGlow)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="2" fill="#f5c842"/>

  <!-- Brand -->
  <text x="80" y="100" font-family="ui-monospace, monospace" font-size="18" fill="#8b94a8" letter-spacing="2">
    bpleone<tspan fill="#f5c842">.</tspan>com
  </text>

  <!-- Headline -->
  <text x="80" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="800" fill="#e8ecf4" letter-spacing="-2">
    One operator.
  </text>
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="800" fill="#f5c842" letter-spacing="-2">
    Seven trading desks.
  </text>

  <!-- Subhead -->
  <text x="80" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#8b94a8">
    IB-style quant lab · Pokémon TCG · Sports Cards · Options · Equity Factors · Trading Comps
  </text>

  <!-- KPI strip -->
  <g transform="translate(80, 430)">
    <rect width="240" height="120" rx="10" fill="#131826" stroke="#232a3e" stroke-width="1"/>
    <text x="20" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#5a6378" letter-spacing="1">CARDS TRACKED</text>
    <text x="20" y="85" font-family="ui-monospace, monospace" font-size="36" font-weight="700" fill="#f5c842">774</text>
    <text x="20" y="105" font-family="system-ui, sans-serif" font-size="12" fill="#8b94a8">in 5 budget brackets</text>
  </g>
  <g transform="translate(340, 430)">
    <rect width="240" height="120" rx="10" fill="#131826" stroke="#232a3e" stroke-width="1"/>
    <text x="20" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#5a6378" letter-spacing="1">LIVE-PRICED</text>
    <text x="20" y="85" font-family="ui-monospace, monospace" font-size="36" font-weight="700" fill="#4ade80">555</text>
    <text x="20" y="105" font-family="system-ui, sans-serif" font-size="12" fill="#8b94a8">verified comps · 4h refresh</text>
  </g>
  <g transform="translate(600, 430)">
    <rect width="240" height="120" rx="10" fill="#131826" stroke="#232a3e" stroke-width="1"/>
    <text x="20" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#5a6378" letter-spacing="1">MARKET CAP</text>
    <text x="20" y="85" font-family="ui-monospace, monospace" font-size="36" font-weight="700" fill="#f5c842">$3.8M</text>
    <text x="20" y="105" font-family="system-ui, sans-serif" font-size="12" fill="#8b94a8">tracked universe</text>
  </g>
  <g transform="translate(860, 430)">
    <rect width="240" height="120" rx="10" fill="#131826" stroke="#232a3e" stroke-width="1"/>
    <text x="20" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#5a6378" letter-spacing="1">STRONG BUYS</text>
    <text x="20" y="85" font-family="ui-monospace, monospace" font-size="36" font-weight="700" fill="#4ade80">84</text>
    <text x="20" y="105" font-family="system-ui, sans-serif" font-size="12" fill="#8b94a8">algo picks today</text>
  </g>

  <!-- Live pulse dot in top-right corner -->
  <circle cx="1100" cy="100" r="6" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="1115" y="105" font-family="ui-monospace, monospace" font-size="14" fill="#4ade80">LIVE</text>
</svg>